name: Deploy Next.js site to Hostinger

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Debug FTP Directory Structure
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python -c "
          import ftplib, os
          server = os.environ.get('FTP_SERVER')
          username = os.environ.get('FTP_USERNAME')
          password = os.environ.get('FTP_PASSWORD')
          if '://' in server: server = server.split('://')[1]
          if ':' in server: server = server.split(':')[0]
          try:
              ftp = ftplib.FTP(server)
              ftp.login(username, password)
              print('FTP LOGIN SUCCESS')
              print('PWD:', ftp.pwd())
              print('NLST:', ftp.nlst())
              
              # Try CWD to domains/nashikfruitandvegetable.com/public_html
              try:
                  ftp.cwd('domains/nashikfruitandvegetable.com/public_html')
                  print('CWD domains/nashikfruitandvegetable.com/public_html SUCCESS')
                  print('CWD NLST:', ftp.nlst())
                  ftp.cwd('/')
              except Exception as e:
                  print('CWD domains/nashikfruitandvegetable.com/public_html FAILED:', e)
                  
              # Try CWD to public_html
              try:
                  ftp.cwd('public_html')
                  print('CWD public_html SUCCESS')
                  print('CWD NLST:', ftp.nlst())
                  ftp.cwd('/')
              except Exception as e:
                  print('CWD public_html FAILED:', e)
          except Exception as e:
              print('FTP LOGIN FAILED:', e)
          " > ftp_debug_log.txt

      - name: Commit Debug Log
        run: |
          git config --global user.name 'FTP Debugger'
          git config --global user.email 'ftp-debugger@github.com'
          git add ftp_debug_log.txt
          git commit -m "Add FTP debug log [skip ci]" || exit 0
          git push

      - name: Clean FTP State
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: python clean_ftp.py

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # Change this to ./ if your FTP account logs in directly inside public_html
          server-dir: domains/nashikfruitandvegetable.com/public_html/

