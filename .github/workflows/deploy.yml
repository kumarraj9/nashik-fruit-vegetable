name: Deploy Next.js site to Hostinger

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Clean FTP State
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: python clean_ftp.py > clean_log.txt 2>&1 || true

      - name: Commit Clean Log
        run: |
          git config --global user.name 'FTP Debugger'
          git config --global user.email 'ftp-debugger@github.com'
          git add clean_log.txt
          git commit -m "Add FTP clean log [skip ci]" || exit 0
          git push


      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # The FTP account logs in directly inside public_html
          server-dir: ./

      - name: Verify FTP Contents After Deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python -c "
          import ftplib, os
          server = os.environ.get('FTP_SERVER')
          username = os.environ.get('FTP_USERNAME')
          password = os.environ.get('FTP_PASSWORD')
          if '://' in server: server = server.split('://')[1]
          if ':' in server: server = server.split(':')[0]
          try:
              ftp = ftplib.FTP(server)
              ftp.login(username, password)
              print('PWD:', ftp.pwd())
              try:
                  ftp.cwd('..')
                  print('CWD to .. SUCCESS. PWD is now:', ftp.pwd())
                  print('NLST in ..:', ftp.nlst())
                  
                  # Try to navigate to the domains folder
                  try:
                      ftp.cwd('domains/nashikfruitandvegetable.com/public_html')
                      print('CWD to domains SUCCESS. PWD is now:', ftp.pwd())
                      print('NLST in domains:', ftp.nlst())
                  except Exception as ex:
                      print('CWD to domains FAILED:', ex)
              except Exception as e:
                  print('CWD to .. FAILED:', e)
          except Exception as e:
              print('FTP LOGIN FAILED:', e)
          " > ftp_verify_log.txt


      - name: Commit Verify Log
        run: |
          git config --global user.name 'FTP Verifier'
          git config --global user.email 'ftp-verifier@github.com'
          git add ftp_verify_log.txt
          git commit -m "Add FTP verification log [skip ci]" || exit 0
          git push

